AWSTemplateFormatVersion: '2010-09-09'
Description: Flash Ticketing production secrets encryption and audit controls.

Metadata:
  TemplateVersion: 1.0.0

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedPattern: '[a-z0-9-]+'

Resources:
  SecretsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: Flash Ticketing production Secrets Manager encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: UseOnlyThroughSecretsManager
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:GenerateDataKey
            Resource: '*'
            Condition:
              StringEquals:
                kms:ViaService: !Sub 'secretsmanager.${AWS::Region}.amazonaws.com'
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Owner
          Value: Ashish Jha

  SecretsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}'
      TargetKeyId: !Ref SecretsKey

  BackendConfigSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: Flash Ticketing production backend environment
      KmsKeyId: !Ref SecretsKey
      Name: !Sub 'flash-ticketing/${EnvironmentName}/backend-env'
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Owner
          Value: Ashish Jha

  FirebaseCredentialSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: Flash Ticketing production Firebase Admin credential
      KmsKeyId: !Ref SecretsKey
      Name: !Sub 'flash-ticketing/${EnvironmentName}/firebase-admin'
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Owner
          Value: Ashish Jha

  AuditBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAuditLogs
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Owner
          Value: Ashish Jha

  AuditBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AuditBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt AuditBucket.Arn
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${AWS::StackName}'
          - Sid: CloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${AuditBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${AWS::StackName}'
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt AuditBucket.Arn
              - !Sub '${AuditBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  AuditLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/cloudtrail/${AWS::StackName}'
      RetentionInDays: 90
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName

  CloudTrailLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WriteCloudTrailLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: logs:CreateLogStream
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${AuditLogGroup}:log-stream:*'
              - Effect: Allow
                Action: logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${AuditLogGroup}:log-stream:*'
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName

  AuditTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: AuditBucketPolicy
    Properties:
      CloudWatchLogsLogGroupArn: !GetAtt AuditLogGroup.Arn
      CloudWatchLogsRoleArn: !GetAtt CloudTrailLogsRole.Arn
      EnableLogFileValidation: true
      IncludeGlobalServiceEvents: true
      IsLogging: true
      IsMultiRegionTrail: true
      S3BucketName: !Ref AuditBucket
      TrailName: !Ref AWS::StackName
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName

  SecretAccessDeniedFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AuditLogGroup
      FilterPattern: '{ ($.eventSource = "secretsmanager.amazonaws.com") && (($.errorCode = "AccessDenied*") || ($.errorCode = "UnauthorizedOperation")) }'
      MetricTransformations:
        - MetricNamespace: FlashTicketing/Security
          MetricName: SecretAccessDenied
          MetricValue: '1'
          DefaultValue: 0

  SecretAccessDeniedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alerts when a Secrets Manager operation is denied
      AlarmName: !Sub '${AWS::StackName}-secret-access-denied'
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: SecretAccessDenied
      Namespace: FlashTicketing/Security
      Period: 300
      Statistic: Sum
      Threshold: 1
      TreatMissingData: notBreaching

  SecretReadFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AuditLogGroup
      FilterPattern: '{ ($.eventSource = "secretsmanager.amazonaws.com") && ($.eventName = "GetSecretValue") }'
      MetricTransformations:
        - MetricNamespace: FlashTicketing/Security
          MetricName: SecretReads
          MetricValue: '1'
          DefaultValue: 0

  UnusualSecretReadAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alerts when production secret retrieval volume is unusual
      AlarmName: !Sub '${AWS::StackName}-unusual-secret-reads'
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: SecretReads
      Namespace: FlashTicketing/Security
      Period: 300
      Statistic: Sum
      Threshold: 20
      TreatMissingData: notBreaching

Outputs:
  BackendConfigSecretArn:
    Description: ARN of the encrypted backend environment secret.
    Value: !Ref BackendConfigSecret
  FirebaseCredentialSecretArn:
    Description: ARN of the encrypted Firebase Admin secret.
    Value: !Ref FirebaseCredentialSecret
  SecretsKeyArn:
    Description: ARN of the customer-managed Secrets Manager KMS key.
    Value: !GetAtt SecretsKey.Arn
  AuditTrailArn:
    Description: ARN of the multi-region audit trail.
    Value: !GetAtt AuditTrail.Arn
