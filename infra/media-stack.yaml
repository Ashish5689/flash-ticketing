AWSTemplateFormatVersion: '2010-09-09'
Description: Private movie media storage delivered through CloudFront.

Metadata:
  TemplateVersion: 1.0.0

Parameters:
  EnvironmentName:
    Type: String
    Default: development
    AllowedPattern: '[a-z0-9-]+'
  BudgetAlertEmail:
    Type: String
    AllowedPattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
    ConstraintDescription: Provide the AWS account email address.

Resources:
  MediaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: movie-ticketing-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  MediaOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Description: Signed CloudFront access to the private movie media bucket
        Name: !Sub '${AWS::StackName}-media-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  MediaDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub '${AWS::StackName} movie media'
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          TargetOriginId: media-bucket
          ViewerProtocolPolicy: redirect-to-https
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Origins:
          - DomainName: !GetAtt MediaBucket.RegionalDomainName
            Id: media-bucket
            OriginAccessControlId: !GetAtt MediaOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        PriceClass: PriceClass_200
      Tags:
        - Key: Application
          Value: movie-ticketing-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${MediaBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${MediaDistribution}'

  DevelopmentBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetLimit:
          Amount: 5
          Unit: USD
        BudgetName: !Sub '${AWS::StackName}-monthly-cost'
        BudgetType: COST
        TimeUnit: MONTHLY
      NotificationsWithSubscribers:
        - Notification:
            ComparisonOperator: GREATER_THAN
            NotificationType: FORECASTED
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - Address: !Ref BudgetAlertEmail
              SubscriptionType: EMAIL
        - Notification:
            ComparisonOperator: GREATER_THAN
            NotificationType: ACTUAL
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - Address: !Ref BudgetAlertEmail
              SubscriptionType: EMAIL

Outputs:
  MediaBucketName:
    Description: Private S3 bucket used by the backend media service.
    Value: !Ref MediaBucket
  MediaDistributionDomainName:
    Description: CloudFront distribution hostname.
    Value: !GetAtt MediaDistribution.DomainName
  MediaDistributionUrl:
    Description: Public HTTPS base URL for movie media.
    Value: !Sub 'https://${MediaDistribution.DomainName}'
