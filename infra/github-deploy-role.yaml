AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub OIDC role for SSM-based Flash Ticketing backend deployments.

Parameters:
  RepositoryName:
    Type: String
    Default: Ashish5689/flash-ticketing
  InstanceId:
    Type: AWS::EC2::Instance::Id
  EnvironmentName:
    Type: String
    Default: production
    AllowedPattern: '[a-z0-9-]+'

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'flash-ticketing-github-deploy-${EnvironmentName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${RepositoryName}:ref:refs/heads/main'
      Policies:
        - PolicyName: deploy-through-ssm
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SendDeploymentCommand
                Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/${InstanceId}'
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}::document/AWS-RunShellScript'
              - Sid: ReadDeploymentCommand
                Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: '*'
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  GitHubDeployRoleArn:
    Description: Set this as the AWS_DEPLOY_ROLE_ARN GitHub repository variable.
    Value: !GetAtt GitHubDeployRole.Arn
