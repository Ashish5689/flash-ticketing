AWSTemplateFormatVersion: '2010-09-09'
Description: Flash Ticketing production API on EC2 behind CloudFront HTTPS.

Metadata:
  TemplateVersion: 1.0.0

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedPattern: '[a-z0-9-]+'
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id
  CloudFrontOriginPrefixListId:
    Type: String
    Description: Managed prefix list ID for com.amazonaws.global.cloudfront.origin-facing.
  RepositoryUrl:
    Type: String
    Default: https://github.com/Ashish5689/flash-ticketing.git
  RepositoryBranch:
    Type: String
    Default: main
  MediaBucketName:
    Type: String
  BackendConfigSecretArn:
    Type: String
  FirebaseCredentialSecretArn:
    Type: String
  SecretsKeyArn:
    Type: String
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:
  ApiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: CloudFront-only HTTP access to the Flash Ticketing API origin
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - Description: CloudFront origin traffic
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !Ref CloudFrontOriginPrefixListId
      SecurityGroupEgress:
        - Description: Outbound access for managed services and package installation
          IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'flash-ticketing-api-${EnvironmentName}'
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName

  ApiInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'flash-ticketing-api-${EnvironmentName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: flash-ticketing-runtime
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: MovieMediaObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub 'arn:${AWS::Partition}:s3:::${MediaBucketName}/movies/*'
              - Sid: DeploymentConfiguration
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Ref BackendConfigSecretArn
                  - !Ref FirebaseCredentialSecretArn
                Condition:
                  Bool:
                    aws:SecureTransport: true
              - Sid: DecryptDeploymentConfiguration
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource: !Ref SecretsKeyArn
                Condition:
                  Bool:
                    aws:SecureTransport: true
                  StringEquals:
                    kms:ViaService: !Sub 'secretsmanager.${AWS::Region}.amazonaws.com'
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName

  ApiInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ApiInstanceRole

  ApiInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      DisableApiTermination: true
      IamInstanceProfile: !Ref ApiInstanceProfile
      Monitoring: true
      SubnetId: !Ref PublicSubnetId
      SecurityGroupIds:
        - !Ref ApiSecurityGroup
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
        HttpPutResponseHopLimit: 2
        InstanceMetadataTags: disabled
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: false
            Encrypted: true
            VolumeSize: 20
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub 'flash-ticketing-api-${EnvironmentName}'
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: WorkloadType
          Value: application-server
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Owner
          Value: Ashish Jha
        - Key: Project
          Value: flash-ticketing
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          dnf install -y docker git nginx jq python3
          systemctl enable --now docker
          systemctl enable --now nginx
          systemctl enable --now amazon-ssm-agent

          if [ ! -f /swapfile ]; then
            dd if=/dev/zero of=/swapfile bs=1M count=2048
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            echo '/swapfile none swap sw 0 0' >> /etc/fstab
          fi

          curl --fail --silent --show-error --location \
            'https://raw.githubusercontent.com/aws/agent-toolkit-for-aws/ab386bbd328b6ec92b3e079ef8d7859d074952e2/plugins/aws-core/skills/aws-secrets-manager/references/asm-exec' \
            --output /usr/local/bin/asm-exec
          chmod 0755 /usr/local/bin/asm-exec

          dnf groupinstall -y 'Development Tools'
          curl --proto '=https' --tlsv1.2 --silent --show-error --fail \
            https://sh.rustup.rs | sh -s -- -y --profile minimal
          git clone --branch v3.1.0 --depth 1 \
            https://github.com/aws/aws-workload-credentials-provider.git \
            /opt/aws-workload-credentials-provider-source
          cd /opt/aws-workload-credentials-provider-source
          /root/.cargo/bin/cargo build --release --locked --bin aws-workload-credentials-provider
          install -d -m 0750 /etc/flash-ticketing
          cat >/etc/flash-ticketing/workload-credentials-provider.toml <<'WCP_CONFIG'
          [logging]
          log_level = "INFO"
          log_to_file = true

          [capabilities.secrets_manager]
          enabled = true
          region = "${AWS::Region}"
          http_port = 2773
          max_conn = 20

          [capabilities.secrets_manager.cache]
          ttl_seconds = 300
          cache_size = 10
          WCP_CONFIG
          cd aws_workload_credentials_provider_common/configuration
          ./install \
            --config /etc/flash-ticketing/workload-credentials-provider.toml \
            --no-privileges \
            --no-sudoers
          systemctl is-active --quiet aws-workload-credentials-provider-sm

          install -d -m 0755 /opt/flash-ticketing /etc/flash-ticketing
          if [ ! -d /opt/flash-ticketing/.git ]; then
            rm -rf /opt/flash-ticketing
            git clone --branch '${RepositoryBranch}' --single-branch '${RepositoryUrl}' /opt/flash-ticketing
          fi

          cat >/etc/nginx/nginx.conf <<'NGINX_CORE'
          user nginx;
          worker_processes auto;
          error_log /var/log/nginx/error.log notice;
          pid /run/nginx.pid;

          events {
            worker_connections 1024;
          }

          http {
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            sendfile on;
            keepalive_timeout 65;
            include /etc/nginx/conf.d/*.conf;
          }
          NGINX_CORE

          cat >/etc/nginx/conf.d/flash-ticketing.conf <<'NGINX'
          server {
            listen 80 default_server;
            server_name _;

            location / {
              proxy_pass http://127.0.0.1:4000;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Request-Id $request_id;
              proxy_connect_timeout 5s;
              proxy_read_timeout 60s;
            }
          }
          NGINX
          nginx -t
          systemctl reload nginx

          cat >/usr/local/bin/deploy-flash-ticketing <<'DEPLOY'
          #!/bin/bash
          set -euo pipefail

          REGION='${AWS::Region}'
          BACKEND_SECRET='${BackendConfigSecretArn}'
          FIREBASE_SECRET='${FirebaseCredentialSecretArn}'
          REPOSITORY_BRANCH='${RepositoryBranch}'
          export AWS_REGION="$REGION"

          install -d -m 0750 /etc/flash-ticketing
          AWS_TOKEN="$(</var/run/awssmatoken)" asm-exec -- \
            sh -c 'umask 077; printf "%s" "$1" > "$2"' _ \
            "{{resolve:secretsmanager:$BACKEND_SECRET:SecretString}}" \
            /etc/flash-ticketing/backend.env
          AWS_TOKEN="$(</var/run/awssmatoken)" asm-exec -- \
            sh -c 'umask 077; printf "%s" "$1" > "$2"' _ \
            "{{resolve:secretsmanager:$FIREBASE_SECRET:SecretString}}" \
            /etc/flash-ticketing/firebase-admin.json
          chmod 0600 /etc/flash-ticketing/backend.env /etc/flash-ticketing/firebase-admin.json

          cd /opt/flash-ticketing
          git fetch origin "$REPOSITORY_BRANCH"
          git reset --hard "origin/$REPOSITORY_BRANCH"

          docker build --target build -t flash-ticketing-api-migrate:current backend
          docker build -t flash-ticketing-api:current backend
          docker run --rm --env-file /etc/flash-ticketing/backend.env flash-ticketing-api-migrate:current npm run db:migrate

          docker rm -f flash-ticketing-api 2>/dev/null || true
          docker run -d \
            --name flash-ticketing-api \
            --restart unless-stopped \
            -p 127.0.0.1:4000:4000 \
            --env-file /etc/flash-ticketing/backend.env \
            -v /etc/flash-ticketing/firebase-admin.json:/run/secrets/firebase-admin.json:ro \
            flash-ticketing-api:current

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4000/health >/dev/null; then
              docker image prune -f >/dev/null
              exit 0
            fi
            sleep 2
          done

          docker logs --tail 100 flash-ticketing-api
          exit 1
          DEPLOY
          chmod 0750 /usr/local/bin/deploy-flash-ticketing
          /usr/local/bin/deploy-flash-ticketing

  ApiElasticIp:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'flash-ticketing-api-${EnvironmentName}'
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName

  ApiElasticIpAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ApiElasticIp.AllocationId
      InstanceId: !Ref ApiInstance

  ApiDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: ApiElasticIpAssociation
    Properties:
      DistributionConfig:
        Comment: !Sub 'Flash Ticketing ${EnvironmentName} API'
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: ec2-api
            DomainName: !Join ['', [!GetAtt ApiElasticIp.PublicIp, '.sslip.io']]
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginKeepaliveTimeout: 5
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 60
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          AllowedMethods:
            - DELETE
            - GET
            - HEAD
            - OPTIONS
            - PATCH
            - POST
            - PUT
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          Compress: true
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          TargetOriginId: ec2-api
          ViewerProtocolPolicy: redirect-to-https
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2021
      Tags:
        - Key: Application
          Value: flash-ticketing
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  ApiInstanceId:
    Description: EC2 instance managed through Systems Manager; no SSH ingress is opened.
    Value: !Ref ApiInstance
  ApiElasticIp:
    Description: Stable EC2 origin address.
    Value: !GetAtt ApiElasticIp.PublicIp
  ApiDistributionDomainName:
    Description: CloudFront hostname for the API.
    Value: !GetAtt ApiDistribution.DomainName
  ApiUrl:
    Description: Public HTTPS API base URL.
    Value: !Sub 'https://${ApiDistribution.DomainName}'
  ApiInstanceRoleArn:
    Description: Least-privilege runtime role used by the EC2 instance.
    Value: !GetAtt ApiInstanceRole.Arn
