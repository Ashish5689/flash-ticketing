name: Seed production showcase

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1
      - name: Seed movies, events, and shows through Systems Manager
        env:
          INSTANCE_ID: ${{ vars.AWS_EC2_INSTANCE_ID }}
        run: |
          commands='[
            "docker run --rm --env-file /etc/flash-ticketing/backend.env -v /etc/flash-ticketing/firebase-admin.json:/run/secrets/firebase-admin.json:ro flash-ticketing-api-migrate:current npm run seed:catalog",
            "docker run --rm --env-file /etc/flash-ticketing/backend.env -v /etc/flash-ticketing/firebase-admin.json:/run/secrets/firebase-admin.json:ro flash-ticketing-api-migrate:current npm run seed:showcase"
          ]'
          command_id="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment 'Seed Flash Ticketing production showcase' \
            --parameters "commands=$commands" \
            --query 'Command.CommandId' \
            --output text)"
          if ! aws ssm wait command-executed --command-id "$command_id" --instance-id "$INSTANCE_ID"; then
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' || true
            exit 1
          fi
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}'
