name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: ci-test-access-secret-that-is-at-least-thirty-two-characters
      JWT_REFRESH_SECRET: ci-test-refresh-secret-that-is-distinct-and-at-least-thirty-two-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
