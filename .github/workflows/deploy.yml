name: Deploy backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'

concurrency:
  group: production-backend
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' && vars.AWS_EC2_INSTANCE_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1
      - name: Deploy through Systems Manager
        env:
          INSTANCE_ID: ${{ vars.AWS_EC2_INSTANCE_ID }}
        run: |
          command_id="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment 'Deploy flash-ticketing main' \
            --parameters 'commands=["sudo /usr/local/bin/deploy-flash-ticketing"]' \
            --query 'Command.CommandId' \
            --output text)"
          aws ssm wait command-executed --command-id "$command_id" --instance-id "$INSTANCE_ID"
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}'
